name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-docs:
    name: Lint markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: '**/*.md'
          config: '.markdownlint.json'
        continue-on-error: true

  build-agent:
    name: Build Go agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: apps/agent/go.sum
      - name: Tidy
        run: go mod tidy
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -count=1 ./...
      - name: Build (linux/amd64)
        run: go build -v ./...
      - name: Build (linux/arm64, pure Go — также работает на Android)
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: '0'
        run: go build -trimpath -ldflags="-s -w" -o bin/vibefly-agent-arm64 ./cmd/agent
      - name: Upload Linux arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibefly-agent-arm64
          path: apps/agent/bin/vibefly-agent-arm64
          if-no-files-found: error

  # Скачиваем cloudflared бинарь от Cloudflare. Нужен для phone-as-a-server:
  # без cloudflared телефон не сможет стать доступным из интернета через trycloudflare туннель.
  fetch-cloudflared:
    name: Fetch cloudflared arm64
    runs-on: ubuntu-latest
    steps:
      - name: Download cloudflared linux-arm64
        run: |
          mkdir -p out
          curl -fSL -o out/cloudflared \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-arm64
          chmod +r out/cloudflared
          ls -la out/
          file out/cloudflared || true
          echo "size: $(du -h out/cloudflared | cut -f1)"
      - name: Upload cloudflared artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflared-linux-arm64
          path: out/cloudflared
          if-no-files-found: error

  # Фаза 2: скачиваем Alpine minirootfs для chroot-runtime. Объём ~3 MB.
  # Используется ChrootSupervisor для запуска Node.js/Python приложений.
  # Пин на 3.20.3 чтобы CI был воспроизводим — новые версии не обязаны быть совместимы.
  fetch-alpine-rootfs:
    name: Fetch Alpine 3.20 rootfs arm64
    runs-on: ubuntu-latest
    steps:
      - name: Download Alpine minirootfs aarch64
        run: |
          mkdir -p out
          curl -fSL -o out/alpine-minirootfs.tar.gz \
            https://dl-cdn.alpinelinux.org/alpine/v3.20/releases/aarch64/alpine-minirootfs-3.20.3-aarch64.tar.gz
          chmod +r out/alpine-minirootfs.tar.gz
          ls -la out/
          file out/alpine-minirootfs.tar.gz || true
          echo "size: $(du -h out/alpine-minirootfs.tar.gz | cut -f1)"
          # Санити-чек: тарбол должен содержать bin/busybox.
          tar tzf out/alpine-minirootfs.tar.gz | grep -q 'bin/busybox' || (echo "тарбол без busybox"; exit 1)
      - name: Upload Alpine rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpine-minirootfs-arm64
          path: out/alpine-minirootfs.tar.gz
          if-no-files-found: error

  build-android:
    name: Build Android app
    runs-on: ubuntu-latest
    needs: [build-agent, fetch-cloudflared, fetch-alpine-rootfs]
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4
      - name: Check gradle wrapper exists
        id: check-wrapper
        run: |
          if [ -f gradle/wrapper/gradle-wrapper.jar ] && [ -f gradlew ]; then
            echo "wrapper-present=true" >> "$GITHUB_OUTPUT"
          else
            echo "wrapper-present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Gradle wrapper не сгенерирован — Android-сборка пропущена."
          fi
      - name: Make gradlew executable
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        run: chmod +x gradlew
      - name: Download agent binary
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        uses: actions/download-artifact@v4
        with:
          name: vibefly-agent-arm64
          path: apps/android/app/src/main/assets/agent/
      - name: Rename agent binary
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        run: |
          mv vibefly-agent-arm64 vibefly-agent
          chmod +r vibefly-agent
          ls -la
        working-directory: apps/android/app/src/main/assets/agent/
      - name: Download cloudflared binary
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        uses: actions/download-artifact@v4
        with:
          name: cloudflared-linux-arm64
          path: apps/android/app/src/main/assets/cloudflared/
      - name: Verify cloudflared in place
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        run: |
          chmod +r cloudflared
          ls -la
        working-directory: apps/android/app/src/main/assets/cloudflared/
      - name: Download Alpine rootfs tarball
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        uses: actions/download-artifact@v4
        with:
          name: alpine-minirootfs-arm64
          path: apps/android/app/src/main/assets/rootfs/
      - name: Verify rootfs in place
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        run: |
          chmod +r alpine-minirootfs.tar.gz
          ls -la
        working-directory: apps/android/app/src/main/assets/rootfs/
      - uses: actions/setup-java@v4
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle cache
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        uses: gradle/actions/setup-gradle@v4
      - name: Compile Kotlin (debug)
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        run: ./gradlew :app:compileDebugKotlin --no-daemon --stacktrace
      - name: Lint
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        run: ./gradlew :app:lintDebug --no-daemon
        continue-on-error: true
      - name: Assemble debug APK
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        run: ./gradlew :app:assembleDebug --no-daemon
      - name: Upload debug APK
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vibefly-debug-apk
          path: apps/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
