name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-docs:
    name: Lint markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: '**/*.md'
          config: '.markdownlint.json'
        continue-on-error: true

  build-agent:
    name: Build Go agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: apps/agent/go.sum
      - name: Tidy
        run: go mod tidy
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -count=1 ./...
      - name: Build (linux/amd64)
        run: go build -v ./...
      - name: Build (linux/arm64)
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: '0'
        run: go build -o bin/vibefly-agent-arm64 ./cmd/agent
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibefly-agent-arm64
          path: apps/agent/bin/vibefly-agent-arm64
          if-no-files-found: error

  # Android: компиляция и lint Kotlin-кода.
  # Job запускается только если gradle wrapper уже закоммичен (наличие .jar
  # проверяется явно — без него gradlew не запустится). После того как Игорь
  # сгенерирует wrapper локально через `gradle wrapper --gradle-version 8.10.2`
  # и закоммитит файлы, Android начнёт проверяться автоматически на каждом push.
  build-android:
    name: Build Android app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4
      - name: Check gradle wrapper exists
        id: check-wrapper
        run: |
          if [ -f gradle/wrapper/gradle-wrapper.jar ] && [ -f gradlew ]; then
            echo "wrapper-present=true" >> "$GITHUB_OUTPUT"
          else
            echo "wrapper-present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Gradle wrapper не сгенерирован — Android-сборка пропущена. Сгенерируй локально: gradle wrapper --gradle-version 8.10.2"
          fi
      - uses: actions/setup-java@v4
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle cache
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        uses: gradle/actions/setup-gradle@v4
      - name: Compile Kotlin (debug)
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        run: ./gradlew :app:compileDebugKotlin --no-daemon --stacktrace
      - name: Lint
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        run: ./gradlew :app:lintDebug --no-daemon
        continue-on-error: true
      - name: Assemble debug APK
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        run: ./gradlew :app:assembleDebug --no-daemon
      - name: Upload debug APK
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vibefly-debug-apk
          path: apps/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
