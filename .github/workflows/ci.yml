name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-docs:
    name: Lint markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: '**/*.md'
          config: '.markdownlint.json'
        continue-on-error: true

  build-agent:
    name: Build Go agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: apps/agent/go.sum
      - name: Tidy
        run: go mod tidy
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -count=1 ./...
      - name: Build (linux/amd64)
        run: go build -v ./...
      # Кросс-компиляция под Android arm64.
      #
      # GOOS=android требует CGO_ENABLED=1 и NDK toolchain (нужен bionic libc) —
      # это сложная сборка. ВМЕСТО этого собираем под GOOS=linux GOARCH=arm64
      # с CGO_ENABLED=0 — pure Go бинарь, который использует Linux syscalls
      # напрямую и работает на Android (Android kernel = Linux). Так делает
      # Termux и большинство Go-приложений запускаемых на Android.
      #
      # Один и тот же бинарь служит для двух целей: для образа Linux rootfs
      # внутри APK (этап 2) и как embedded agent в Android app sandbox (этап 1).
      - name: Build (linux/arm64, pure Go — также работает на Android)
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: '0'
        run: go build -trimpath -ldflags="-s -w" -o bin/vibefly-agent-arm64 ./cmd/agent
      - name: Upload Linux arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibefly-agent-arm64
          path: apps/agent/bin/vibefly-agent-arm64
          if-no-files-found: error

  build-android:
    name: Build Android app
    runs-on: ubuntu-latest
    needs: build-agent
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4
      - name: Check gradle wrapper exists
        id: check-wrapper
        run: |
          if [ -f gradle/wrapper/gradle-wrapper.jar ] && [ -f gradlew ]; then
            echo "wrapper-present=true" >> "$GITHUB_OUTPUT"
          else
            echo "wrapper-present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Gradle wrapper не сгенерирован — Android-сборка пропущена."
          fi
      - name: Download agent binary
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        uses: actions/download-artifact@v4
        with:
          name: vibefly-agent-arm64
          path: apps/android/app/src/main/assets/agent/
      - name: Rename agent binary
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        run: |
          mv vibefly-agent-arm64 vibefly-agent
          chmod +r vibefly-agent
          ls -la
        working-directory: apps/android/app/src/main/assets/agent/
      - uses: actions/setup-java@v4
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle cache
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        uses: gradle/actions/setup-gradle@v4
      - name: Compile Kotlin (debug)
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        run: ./gradlew :app:compileDebugKotlin --no-daemon --stacktrace
      - name: Lint
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        run: ./gradlew :app:lintDebug --no-daemon
        continue-on-error: true
      - name: Assemble debug APK
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        run: ./gradlew :app:assembleDebug --no-daemon
      - name: Upload debug APK
        if: steps.check-wrapper.outputs.wrapper-present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vibefly-debug-apk
          path: apps/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
